                        <!-- Media Inputs (Hidden by default) -->
                        <div id="media-inputs" class="md:col-span-2 space-y-4 hidden">
                            <!-- Image Upload -->
                            <div id="image-input" class="hidden">
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Upload Image:</label>
                                <div class="upload-area dark:bg-slate-800 cursor-pointer" onclick="document.getElementById('file-input').click()">
                                    <i class="fas fa-cloud-upload-alt text-3xl text-blue-500 mb-2"></i>
                                    <p class="text-slate-600 dark:text-slate-400">Click to upload image or drag & drop</p>
                                    <p class="text-xs text-slate-500 dark:text-slate-500 mt-1">PNG, JPG, GIF up to 5MB</p>
                                    <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
                                </div>
                                <div id="image-preview" class="mt-3 hidden">
                                    <img id="preview-image" class="media-preview w-full rounded-xl">
                                    <button type="button" onclick="removeImage()" class="mt-2 text-red-500 text-sm">
                                        <i class="fas fa-trash mr-1"></i> Remove Image
                                    </button>
                                </div>
                            </div>
                            
                            <!-- YouTube Input -->
                            <div id="youtube-input" class="hidden">
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">YouTube Video URL:</label>
                                <input type="text" id="inp-youtube" placeholder="https://www.youtube.com/watch?v=..." class="w-full p-4 rounded-2xl bg-white dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                                <p class="text-xs text-slate-500 dark:text-slate-500 mt-1">Paste full YouTube URL or video ID</p>
                                <div id="youtube-preview" class="mt-3 hidden">
                                    <div class="video-container rounded-xl overflow-hidden">
                                        <iframe id="preview-youtube" frameborder="0" allowfullscreen></iframe>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Video Link Input -->
                            <div id="video-input" class="hidden">
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Video URL (MP4, WebM):</label>
                                <input type="text" id="inp-video" placeholder="https://example.com/video.mp4" class="w-full p-4 rounded-2xl bg-white dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                                <p class="text-xs text-slate-500 dark:text-slate-500 mt-1">Direct link to video file (MP4, WebM) or embed URL</p>
                            </div>
                        </div>
                        
                        <!-- Description -->
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Description / Steps:</label>
                            <textarea id="inp-desc" rows="4" placeholder="Langkah-langkah repair... (Gunakan \n untuk line baru)" class="w-full p-4 rounded-2xl bg-white dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                        </div>
                        
                        <!-- Tools & Time -->
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Tools Required:</label>
                            <input type="text" id="inp-tools" placeholder="Screwdriver, Wrench, Jack..." class="w-full p-4 rounded-2xl bg-white dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Time Required:</label>
                            <input type="text" id="inp-time" placeholder="30 minit - 2 jam" class="w-full p-4 rounded-2xl bg-white dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        
                        <!-- Action Buttons -->
                        <div class="md:col-span-2 flex gap-4">
                            <button id="btn-save" onclick="handleSave()" class="flex-1 bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition">SIMPAN DATA</button>
                            <button id="btn-cancel" onclick="cancelEdit()" class="hidden flex-1 bg-slate-300 dark:bg-slate-700 text-slate-700 dark:text-slate-300 p-4 rounded-2xl font-bold shadow-lg hover:bg-slate-400 dark:hover:bg-slate-600 transition">BATAL EDIT</button>
                        </div>
                    </div>
                    
                    <!-- FILTER SECTION UNTUK ADMIN -->
                    <div class="flex items-center gap-4 mb-6 bg-slate-100 dark:bg-slate-800 p-4 rounded-2xl">
                        <i class="fas fa-filter text-blue-500"></i>
                        <span class="font-medium">Filter Kategori:</span>
                        <select id="admin-filter" onchange="renderAdmin()" class="p-3 rounded-xl bg-white dark:bg-slate-700 border-none ring-1 ring-slate-300 dark:ring-slate-600 outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="all">Semua Kategori</option>
                            <option value="maintenance">Maintenance</option>
                            <option value="problems">Problems</option>
                            <option value="tools">Tools</option>
                            <option value="safety">Safety</option>
                            <option value="habits">Habits</option>
                            <option value="knowledge">Knowledge</option>
                        </select>
                        <span id="filter-count" class="text-sm text-slate-500 dark:text-slate-400 ml-auto"></span>
                    </div>
                    
                    <!-- Admin Table -->
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="text-slate-400 text-[10px] uppercase font-black border-b dark:border-slate-800">
                                <tr>
                                    <th class="p-4">Title</th>
                                    <th class="p-4">Category</th>
                                    <th class="p-4">Media</th>
                                    <th class="p-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="admin-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- JavaScript Files -->
<script src="js/config.js"></script>
<script src="js/ai-knowledge.js"></script>
<script src="js/core-functions.js"></script>
<script src="js/search-functions.js"></script>
<script src="js/render-functions.js"></script>
<script src="js/media-functions.js"></script>
<script src="js/admin-functions.js"></script>
<script src="js/detail-functions.js"></script>
<script src="js/pdf-functions.js"></script>
<script src="js/chat-functions.js"></script>
<script src="js/init.js"></script>
</body>
</html>
